<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | HassleFreeDrive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main-content">
        <header class="top-header"></header>

        <section id="dashboard" class="view-section view-container active fade-in">
            <div class="page-header">
                <h1>Dashboard Overview</h1>
                <p>Welcome back, here's what's happening today.</p>
            </div>

            <div class="stats-grid" id="dashboardStats">
                <!-- Injected by app.js -->
            </div>

            <div class="card users-table-card">
                <div class="card-header flex-header">
                    <h3><i class="fa-solid fa-users"></i> All Users & Drivers</h3>
                    <a href="drivers.html" class="view-all">View All</a>
                </div>
                <div class="table-responsive">
                    <table class="data-table" id="usersDriversTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Join Date</th>
                                <th>Gender</th>
                                <th>Role</th>
                                <th class="text-center">Active</th>
                            </tr>
                        </thead>
                        <tbody id="usersDriversTableBody">
                            <!-- Injected by app.js -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="dashboard-grid">
                <div class="card chart-card">
                    <div class="card-header flex-header">
                        <h3>Revenue Overview</h3>
                        <a href="reports.html" class="view-all">Full Report</a>
                    </div>
                    <div class="card-body">
                        <canvas id="revenueChart"></canvas>
                    </div>
                </div>

                <div class="card activity-card">
                    <div class="card-header flex-header">
                        <h3>Latest Approvals</h3>
                        <a href="drivers.html" class="view-all">Manage</a>
                    </div>
                    <div class="card-body">
                        <div class="activity-list" id="recentApprovalsList">
                            <!-- Injected by app.js -->
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="../js/data.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/app.js"></script>
</body>

</html>
